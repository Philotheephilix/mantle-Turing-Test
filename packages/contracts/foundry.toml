[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.27"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./" }]

[profile.ci]
fuzz = { runs = 1000 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
