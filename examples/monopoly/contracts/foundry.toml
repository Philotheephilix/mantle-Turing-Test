[profile.default]
src = "."
out = "out"
libs = ["../../../packages/contracts/lib"]
script = "."
test = "."
solc = "0.8.27"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200
allow_paths = ["../../../packages/contracts"]
fs_permissions = [{ access = "read-write", path = "../" }, { access = "read", path = "../../../packages/contracts" }]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
